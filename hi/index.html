<div class="dialogue">"म कहती है बता दो। वो सही कहती है। लेकिन जब भी प्रिया को हँसते देखता हूँ, हिम्मत नहीं होती।"</div>

<div class="dialogue">"आज तेरी पसंद की दाल-चावल बनाए। बैठ ना।" वो मुस्कुराते हैं।</div>
<p>आप बैठती हैं। खाती हैं। बारिश की, पड़ोसियों के नए कुत्ते की, किचन की रंगाई की बात करती हैं। सामान्य बातें। सुरक्षित बातें।</p>
<p>लेकिन उस मैसेज के शब्द आपके सीने में अंगारे की तरह जल रहे हैं।</p>
<p class="inner-thought">मुझे उसे बताना होगा। मैं ये राज़ और नहीं रख सकता—</p>
<p>क्या नहीं रख सकते? कौन है म?</p>

<p>खाने पर उनका चेहरा पढ़ती हैं। वो ऑफ़िस की मज़ेदार बात सुना रहे हैं। हँस रहे हैं। आप दरारें ढूँढ रही हैं — अपराधबोध, दूरी, जो भी छुपा रहे हैं।</p>

<div class="dialogue">"मुझे उसे बताना होगा। मैं ये राज़ और नहीं रख सकता—"</div>

<p class="inner-thought">तीन महीने की बुधवार की कॉल्स। तीन महीने के राज़।</p>
<p>म का एक और मैसेज मिलता है, दो हफ़्ते पुराना:</p>
<div class="dialogue">"अर्जुन, तुझे प्रिया को बताना होगा। उसका हक़ है जानने का। बचाना बंद कर और भरोसा कर। — म"</div>`,

      { label: "ख", text: "बुधवार का इंतज़ार करो। अर्जुन के पीछे जाओ। देखो वो सच में कहाँ जाते हैं।", next: "follow_wed" }

<p>आप उनका नाम लेती हैं और आपकी आवाज़ में कुछ ऐसा है कि वो तुरंत पलट जाते हैं।</p>

<p>लकड़ी का चम्मच ज़मीन पर गिरता है। उनका चेहरा सफ़ेद पड़ जाता है, फिर टूट जाता है। वो इनकार नहीं करते। बहाना नहीं बनाते। बस खड़े रहते हैं, और फिर आँखों में आँसू आ जाते हैं।</p>
<div class="dialogue">"मुझे समझ नहीं आ रहा था कैसे बताऊँ। हफ़्तों से शब्द ढूँढ रहा था।"</div>

    html += `<div style="margin-top:24px;"><p style="font-size:12px;color:#555;">और कहानियाँ जल्द आ रही हैं।</p></div>`;
    html += `<div style="margin-top:16px;"><a href="../" style="color:#8a8a7a;font-size:12px;text-decoration:none;">Read in English</a></div>`;
    html += `</div>`;
    plausible('story_end_hi', {props: {ending: node.ending.title}});
  } else if (node.choices.length > 0) {
    html += `<div class="choices">`;
    html += `<div class="prompt">आप क्या करेंगी?</div>`;
    node.choices.forEach(c => {
      html += `<button class="choice-btn" onclick="makeChoice('${c.next}','${c.label}')">`;
      html += `<span class="choice-label">${c.label}</span>`;
      html += c.text;
      html += `</button>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  container.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function makeChoice(nextNode, label) {
  choicesMade.push(label);
  plausible('choice_hi', {props: {node: currentNode, choice: label}});
  showNode(nextNode);
}

function restart() {
  choicesMade = [];
  document.getElementById('story-container').innerHTML = '';
  document.getElementById('screen-title').classList.add('active');
  document.getElementById('progress').style.width = '0%';
  window.scrollTo({ top: 0 });
}

function shareStory() {
  const text = "मैंने अभी 'आखिरी संदेश' खेली — प्यार, राज़ और मुश्किल फ़ैसलों की एक इंटरैक्टिव कहानी। आप भी खेलें:";
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: 'आखिरी संदेश', text, url });
  } else {
    navigator.clipboard.writeText(text + ' ' + url).then(() => alert('लिंक कॉपी हो गया!'));
  }
}
</script>
