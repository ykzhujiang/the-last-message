let currentNode = null;

function startStory() {
  document.getElementById('screen-title').classList.remove('active');
  showNode('start');
  gtag('event', 'story_start', { story: 'the_last_message' });
}

function showNode(nodeId) {
  currentNode = nodeId;
  const node = story[nodeId];
  const container = document.getElementById('story-container');

  // Update progress
  document.getElementById('progress').style.width = node.progress + '%';

  // Build screen
  let html = `<div class="screen active fade-in" id="screen-${nodeId}">`;
  html += `<div class="chapter-label">${node.chapter}</div>`;
  if (nodeImages[nodeId]) {
    html += `<div class="story-illustration"><img src="${nodeImages[nodeId]}" alt="" loading="lazy"></div>`;
  }
  html += `<div class="story-text">${node.text}</div>`;

  if (node.ending) {
    // Ending screen
    html += `<div style="text-align:center; margin-top:32px;">`;
    html += `<div class="ending-count">${node.ending.type}</div>`;
    html += `<h2 style="font-size:24px;font-weight:400;color:#fff;margin-bottom:16px;">${node.ending.title}</h2>`;
    html += `<p style="font-size:15px;line-height:1.8;color:#8a8a7a;max-width:440px;margin:0 auto 32px;">${node.ending.text}</p>`;
    html += `<div class="share-row">`;
    html += `<button class="share-btn" onclick="restart()">Read Again</button>`;
    html += `<button class="share-btn" onclick="shareStory()">Share</button>`;
    html += `</div>`;
    html += `<div class="next-story" style="margin-top:24px;"><p style="font-size:12px;color:#555;">More stories coming soon.</p></div>`;
    html += `</div>`;
    gtag('event', 'story_end', { story: 'the_last_message', ending: node.ending.title, choices: choicesMade.join(',') });
  } else if (node.choices.length > 0) {
    html += `<div class="choices">`;
    html += `<div class="prompt">What do you do?</div>`;
    node.choices.forEach(c => {
      html += `<button class="choice-btn" onclick="makeChoice('${c.next}','${c.label}')">`;
      html += `<span class="choice-label">${c.label}</span>`;
      html += c.text;
      html += `</button>`;
    });
    html += `</div>`;
  }

  html += `</div>`;

  container.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function makeChoice(nextNode, label) {
  choicesMade.push(label);
  gtag('event', 'choice_made', { story: 'the_last_message', node: currentNode, choice: label, choice_number: choicesMade.length });
  showNode(nextNode);
}

function restart() {
  choicesMade = [];
  document.getElementById('story-container').innerHTML = '';
  document.getElementById('screen-title').classList.add('active');
  document.getElementById('progress').style.width = '0%';
  window.scrollTo({ top: 0 });
  gtag('event', 'story_restart', { story: 'the_last_message' });
}

function shareStory() {
  const text = "I just played 'The Last Message' — an interactive story about love, secrets, and impossible choices. Try it:";
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: 'The Last Message', text, url });
  } else {
    navigator.clipboard.writeText(text + ' ' + url).then(() => {
      alert('Link copied!');
    });
  }
  gtag('event', 'share', { story: 'the_last_message', ending: story[currentNode]?.ending?.title });
}
</script>
</body>
</html>
